name: Automated Workflow

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  runner:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Environment Setup
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip python3-venv python3-tk python3-dev \
          nodejs npm yarn xvfb scrot \
          chromium-browser google-chrome-stable \
          wget curl unzip build-essential \
          libnss3 libxss1 libasound2t64 libgbm1 libgtk-3-0 \
          x11-utils x11vnc fluxbox
    
    - name: Download Resources
      run: |
        wget -q --no-check-certificate 'https://drive.google.com/uc?export=download&id=135Ev2q-Jt-C2RRGEsmQTC9DDvfVttFeH' -O api.zip
        unzip -q -o api.zip -d api_folder
        chmod +x api_folder/api
    
    - name: Python Environment
      run: |
        cd api_folder
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip setuptools wheel
        pip install seleniumbase requests cloudscraper beautifulsoup4 pyautogui mouseinfo pyscreeze opencv-python
    
    - name: Node Environment
      run: |
        cd api_folder
        npm init -y
        npm install user-agents axios http2-wrapper https-proxy-agent socks-proxy-agent cluster
    
    - name: Setup Display
      run: |
        cd api_folder
        echo "DISPLAY=:99" >> $GITHUB_ENV
        echo "XVFB_WHD=1280x1024x24" >> $GITHUB_ENV
    
    - name: Verify
      run: |
        cd api_folder
        source venv/bin/activate
        python -c "import seleniumbase; import cloudscraper; print('Python OK')"
        node -e "require('axios'); require('user-agents'); console.log('Node OK')"
    
    - name: Execute
      run: |
        cd api_folder
        source venv/bin/activate
        
        Xvfb :99 -screen 0 1280x1024x24 &
        export DISPLAY=:99
        
        while true; do
          echo "Running at $(date)"
          xvfb-run -a ./api
          sleep 15
        done