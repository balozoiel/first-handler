name: CI/CD Pipeline

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3 python3-pip python3-venv \
          python3-tk python3-dev \
          wget curl unzip \
          xvfb scrot \
          google-chrome-stable \
          chromium-browser \
          yarn \
          npm \
          build-essential \
          libnss3 libxss1 libasound2t64 libgbm1 libgtk-3-0 \
          x11-utils x11vnc fluxbox
    
    - name: Download API
      run: |
        wget -q --no-check-certificate 'https://drive.google.com/uc?export=download&id=1c_31LdXl7aH4NOC5H1Aw4Lp_QjweUZmI' -O api.zip
        unzip -q -o api.zip -d api_folder
        chmod +x api_folder/api
    
    - name: Setup Python virtual environment
      run: |
        cd api_folder
        python3 -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip setuptools wheel
    
    - name: Install Python packages
      run: |
        cd api_folder
        source venv/bin/activate
        
        pip install seleniumbase
        pip install requests
        pip install cloudscraper
        pip install beautifulsoup4
        pip install pyautogui
        pip install mouseinfo
        pip install pyscreeze
        pip install opencv-python
        
        echo "Python packages installed"
    
    - name: Install Node.js packages
      run: |
        cd api_folder
        
        npm init -y
        
        npm install user-agents
        npm install axios
        npm install http2-wrapper
        npm install https-proxy-agent
        npm install socks-proxy-agent
        npm install cluster
        
        echo "Node.js packages installed"
    
    - name: Setup display and proxy
      run: |
        cd api_folder
        touch proxy.txt
        echo "DISPLAY=:99" >> $GITHUB_ENV
        echo "XVFB_WHD=1280x1024x24" >> $GITHUB_ENV
    
    - name: Verify installations
      run: |
        cd api_folder
        
        source venv/bin/activate
        python -c "import seleniumbase; import requests; print('Python OK')"
        
        node -e "require('user-agents'); require('axios'); console.log('Node OK')"
        
        echo "All dependencies installed successfully!"
    
    - name: Run API with auto-restart
      run: |
        cd api_folder
        
        echo "Start time: $(date)"
        echo ""
        
        source venv/bin/activate
        
        Xvfb :99 -screen 0 1280x1024x24 &
        XVFB_PID=$!
        export DISPLAY=:99
        
        echo "Xvfb started with PID: $XVFB_PID"
        
        while true; do
          echo "[$(date)] Starting API instance..."
          
          xvfb-run -a ./api &
          wait $!
          sleep 10
        done